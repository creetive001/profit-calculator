<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>투어공연 계산기</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 20px;
        }
        .page { display: none; }
        .page.active { display: block; }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px 24px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }
        h1 { font-size: 20px; color: #1a1a2e; font-weight: 700; }
        .setting-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 4px;
        }
        .back-btn {
            background: none;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 13px;
            cursor: pointer;
            color: #666;
        }
        .input-group { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 6px;
            font-weight: 600;
        }
        select, input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            color: #1a1a2e;
            background: #fafafa;
            outline: none;
            transition: border-color 0.2s;
        }
        select:focus, input:focus {
            border-color: #4f8ef7;
            background: white;
        }
        button.primary {
            width: 100%;
            padding: 16px;
            background: #4f8ef7;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        button.save {
            width: 100%;
            padding: 16px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
        }
        .result {
            margin-top: 24px;
            border-radius: 16px;
            overflow: hidden;
            display: none;
        }
        .result-header {
            background: #1a1a2e;
            color: white;
            padding: 14px 20px;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        .result-row .label { color: #888; font-weight: 600; }
        .result-row .value { font-weight: 700; color: #1a1a2e; }
        .result-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            font-size: 16px;
            font-weight: 800;
        }
        .result-total.positive { background: #e8f5e9; color: #2e7d32; }
        .result-total.negative { background: #fdecea; color: #c62828; }
        .result-fee {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 20px;
            font-size: 16px;
            font-weight: 800;
            background: #fdecea;
            color: #c62828;
        }
        .result-fee .sub { font-size: 12px; color: #c62828; margin-left: 6px; font-weight: 600; }
        .round-detail {
            background: #f9f9f9;
            padding: 10px 20px;
            font-size: 12px;
            color: #999;
            border-bottom: 1px solid #f0f0f0;
        }
        .profit-badge {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 8px;
            white-space: nowrap;
        }
        .badge-danger  { background: #ff1744; color: white; }
        .badge-warning { background: #ff9800; color: white; }
        .badge-ok      { background: #4caf50; color: white; }
        .badge-great   { background: #1976d2; color: white; }
        .badge-best    { background: #7b1fa2; color: white; }
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 20px 0 10px;
            padding-bottom: 6px;
            border-bottom: 2px solid #f0f0f0;
        }
        .setting-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
        }
        .setting-group input { padding: 10px 12px; font-size: 13px; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }

        /* 비밀번호 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 20px;
            padding: 30px 24px;
            width: 300px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .modal h2 { font-size: 18px; color: #1a1a2e; margin-bottom: 8px; }
        .modal p { font-size: 13px; color: #888; margin-bottom: 20px; }
        .modal input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 20px;
            text-align: center;
            letter-spacing: 8px;
            color: #1a1a2e;
            background: #fafafa;
            outline: none;
            margin-bottom: 16px;
        }
        .modal input:focus { border-color: #4f8ef7; }
        .modal-error { font-size: 12px; color: #c62828; margin-bottom: 12px; display: none; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-cancel { background: #f0f0f0; color: #666; }
        .btn-confirm { background: #4f8ef7; color: white; }
    </style>
</head>
<body>

<!-- 비밀번호 모달 -->
<div class="modal-overlay" id="pwModal">
    <div class="modal">
        <h2>🔒 설정</h2>
        <p>비밀번호를 입력해주세요</p>
        <input type="password" id="pwInput" maxlength="4" placeholder="••••" oninput="checkPwLength()">
        <div class="modal-error" id="pwError">비밀번호가 틀렸습니다</div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeModal()">취소</button>
            <button class="btn-confirm" onclick="confirmPw()">확인</button>
        </div>
    </div>
</div>

<!-- 메인 페이지 -->
<div class="page active" id="mainPage">
    <div class="container">
        <div class="top-bar">
            <h1>🎭 투어공연 계산기</h1>
            <button class="setting-btn" onclick="openModal()">⚙️</button>
        </div>

        <div class="input-group">
            <label>지역</label>
            <select id="region">
                <option value="수도권">수도권</option>
                <option value="충청도">충청도</option>
                <option value="강원북도">강원·북도</option>
                <option value="남도">남도</option>
            </select>
        </div>

        <div class="input-group">
            <label>객석수</label>
            <select id="seats">
                <option value="300">300석</option>
                <option value="350">350석</option>
                <option value="400">400석</option>
                <option value="450">450석</option>
                <option value="500">500석</option>
            </select>
        </div>

        <div class="input-group">
            <label>총 관객수 (명)</label>
            <input type="number" id="people" placeholder="예: 600" min="1">
        </div>

        <div class="input-group">
            <label>티켓가격 (원)</label>
            <input type="number" id="ticket" placeholder="예: 10000" min="1">
        </div>

        <div class="input-group">
            <label>발전기금(원)</label>
            <input type="number" id="fund" placeholder="예: 1000" min="0">
        </div>

        <button class="primary" onclick="calculate()">계산하기</button>

        <div class="result" id="result"></div>
    </div>
</div>

<!-- 설정 페이지 -->
<div class="page" id="settingsPage">
    <div class="container">
        <div class="top-bar">
            <h1>⚙️ 설정</h1>
            <button class="back-btn" onclick="goMain()">← 돌아가기</button>
        </div>

        <div class="section-title">📍 기본지출 (원)</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px;text-align:center;">
            <span style="font-size:12px;color:#888;">1회차</span>
            <span style="font-size:12px;color:#888;">2회차</span>
            <span style="font-size:12px;color:#888;">3회차</span>
        </div>

        <div style="margin-bottom:8px;">
            <label style="font-size:12px;color:#4f8ef7;font-weight:700;">수도권</label>
            <div class="setting-group">
                <input type="number" id="a_수도권_1" value="2000000">
                <input type="number" id="a_수도권_2" value="2750000">
                <input type="number" id="a_수도권_3" value="3500000">
            </div>
        </div>

        <div style="margin-bottom:8px;">
            <label style="font-size:12px;color:#4f8ef7;font-weight:700;">충청도</label>
            <div class="setting-group">
                <input type="number" id="a_충청도_1" value="3000000">
                <input type="number" id="a_충청도_2" value="3750000">
                <input type="number" id="a_충청도_3" value="4500000">
            </div>
        </div>

        <div style="margin-bottom:8px;">
            <label style="font-size:12px;color:#4f8ef7;font-weight:700;">강원·북도</label>
            <div class="setting-group">
                <input type="number" id="a_강원북도_1" value="3500000">
                <input type="number" id="a_강원북도_2" value="4250000">
                <input type="number" id="a_강원북도_3" value="5000000">
            </div>
        </div>

        <div style="margin-bottom:8px;">
            <label style="font-size:12px;color:#4f8ef7;font-weight:700;">남도</label>
            <div class="setting-group">
                <input type="number" id="a_남도_1" value="4000000">
                <input type="number" id="a_남도_2" value="4750000">
                <input type="number" id="a_남도_3" value="5500000">
            </div>
        </div>

        <div class="section-title">📊 수수료 비율</div>
        <div class="input-group">
            <label>수수료 비율 (%)</label>
            <input type="number" id="s_fee" value="20" min="0" max="100">
        </div>

        <button class="save" onclick="saveSettings()">💾 저장하기</button>
    </div>
</div>

<div class="toast" id="toast">설정이 저장되었습니다!</div>

<script>
    let settings = {
        baseCost: {
            "수도권":  [2000000, 2750000, 3500000],
            "충청도":  [3000000, 3750000, 4500000],
            "강원북도": [3500000, 4250000, 5000000],
            "남도":    [4000000, 4750000, 5500000]
        },
        feeRate: 20
    };

    function openModal() {
        document.getElementById('pwInput').value = '';
        document.getElementById('pwError').style.display = 'none';
        document.getElementById('pwModal').classList.add('active');
        setTimeout(() => document.getElementById('pwInput').focus(), 100);
    }

    function closeModal() {
        document.getElementById('pwModal').classList.remove('active');
    }

    function checkPwLength() {
        const val = document.getElementById('pwInput').value;
        if (val.length === 4) confirmPw();
    }

    function confirmPw() {
        const val = document.getElementById('pwInput').value;
        if (val === '0701') {
            closeModal();
            goSettings();
        } else {
            document.getElementById('pwError').style.display = 'block';
            document.getElementById('pwInput').value = '';
            document.getElementById('pwInput').focus();
        }
    }

    function goSettings() {
        document.getElementById('mainPage').classList.remove('active');
        document.getElementById('settingsPage').classList.add('active');
    }

    function goMain() {
        document.getElementById('settingsPage').classList.remove('active');
        document.getElementById('mainPage').classList.add('active');
    }

    function saveSettings() {
        const regions = ["수도권", "충청도", "강원북도", "남도"];
        regions.forEach(r => {
            settings.baseCost[r] = [
                parseFloat(document.getElementById(`a_${r}_1`).value),
                parseFloat(document.getElementById(`a_${r}_2`).value),
                parseFloat(document.getElementById(`a_${r}_3`).value)
            ];
        });
        settings.feeRate = parseFloat(document.getElementById('s_fee').value);

        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
    }

    function formatWon(n) {
        const abs = Math.abs(Math.round(n));
        return (n < 0 ? "-" : "") + "₩" + abs.toLocaleString('ko-KR');
    }

    function getProfitBadge(E) {
        if (E < 200000) {
            return `<span class="profit-badge badge-danger">⚠️ 공연X 경고</span>`;
        } else if (E < 400000) {
            return `<span class="profit-badge badge-warning">📉 수익률 안좋음</span>`;
        } else if (E < 800000) {
            return `<span class="profit-badge badge-ok">👍 적당한 수익률</span>`;
        } else if (E < 1000000) {
            return `<span class="profit-badge badge-great">🎯 이상적인 수익률</span>`;
        } else {
            return `<span class="profit-badge badge-best">🎉 마진률 굿!!</span>`;
        }
    }

    function calcOne(A, people, ticketPrice, fundUnit) {
        const D = people * ticketPrice;
        const F = people * fundUnit;
        const G = D - A - F;
        const H = G / 10 * (settings.feeRate / 10);
        const I = D / 11;
        const J = D - A - I;
        const K = J / 11;
        const E = D - A - F - H - I - K;
        return { E, H, F };
    }

    function calculate() {
        const region = document.getElementById('region').value;
        const seats = parseInt(document.getElementById('seats').value);
        const totalPeople = parseInt(document.getElementById('people').value);
        const ticketPrice = parseFloat(document.getElementById('ticket').value);
        const fundUnit = parseFloat(document.getElementById('fund').value);

        if (!totalPeople || !ticketPrice || isNaN(fundUnit)) {
            alert('모든 항목을 입력해주세요.');
            return;
        }

        const costs = settings.baseCost[region];

        let roundNum;
        if (totalPeople <= seats) {
            roundNum = 1;
        } else if (totalPeople <= seats * 2) {
            roundNum = 2;
        } else {
            roundNum = 3;
        }

        const A = costs[roundNum - 1];
        const { E, H, F } = calcOne(A, totalPeople, ticketPrice, fundUnit);
        const badge = getProfitBadge(E);

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';

        let html = `<div class="result-header">📊 ${region} · 총 ${totalPeople}명 · ${seats}석 극장</div>`;
        html += `<div class="round-detail">${roundNum}회차 · 기본지출 ${A.toLocaleString()}원</div>`;
        html += `
            <div class="result-row">
                <span class="label">총 회차</span>
                <span class="value">${roundNum}회</span>
            </div>
            <div class="result-row">
                <span class="label">기금 합계</span>
                <span class="value">${formatWon(F)}</span>
            </div>
            <div class="result-total ${E >= 0 ? 'positive' : 'negative'}">
                <span>공연팀 순이익 ${badge}</span>
                <span>${formatWon(E)}</span>
            </div>
            <div class="result-fee">
                <span>수수료 합계</span>
                <span>${formatWon(H)}<span class="sub">${settings.feeRate}%</span></span>
            </div>
        `;

        resultDiv.innerHTML = html;
    }
</script>
</body>
</html>
